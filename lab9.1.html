<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 1 Resuelto</title>

<style>
.caja-bloque{
    border:2px solid red;
    background-color:#FFF4A3;
    padding:10px;
}

.texto-inline{
    border:1px dashed blue;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Ejercicio 1 - Bloques e Inline</h1>

<div class="caja-bloque">
    Esto es un contenedor div (ocupa todo el ancho).
</div>

<p>
    Texto normal donde
    <span class="texto-inline">
        este fragmento span
    </span>
    está en línea.
</p>

</body>
</html>
