<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 4 Resuelto</title>

<style>

.caja-sin-padding{
    border:3px double #333;
    padding:0px;
    margin-bottom:20px;
}

.caja-con-padding{
    border:3px double #333;
    padding:20px 40px;
}

</style>

</head>
<body>

<h1>Ejercicio 4 - Padding</h1>

<div class="caja-sin-padding">
    Este texto está pegado al borde.
</div>

<div class="caja-con-padding">
    Este texto tiene espacio interno gracias al padding.
</div>

</body>
</html>
